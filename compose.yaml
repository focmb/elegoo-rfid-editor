services:
  elegoo-rfid-editor:
    build:
      context: ./elegoo-rfid-editor
      dockerfile: Dockerfile
    container_name: centauri-rfid-editor
    restart: unless-stopped
    ports:
      - "172.16.1.4:8092:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  spoolman:
    image: ghcr.io/donkie/spoolman:latest
    container_name: centauri-spoolman
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./spoolman-data
        target: /home/app/.local/share/spoolman
    ports:
      - "172.16.1.4:7912:8000"
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
